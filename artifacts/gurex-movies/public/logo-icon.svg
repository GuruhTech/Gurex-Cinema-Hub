  <rect x="20" y="1"  width="7" height="8" rx="2.5" fill="rgba(0,0,0,0.35)"/>
  <rect x="33" y="1"  width="7" height="8" rx="2.5" fill="rgba(0,0,0,0.35)"/>
  <rect x="46" y="1"  width="7" height="8" rx="2.5" fill="rgba(0,0,0,0.35)"/>
  <!-- Film notches bottom -->
  <rect x="7"  y="51" width="7" height="8" rx="2.5" fill="rgba(0,0,0,0.35)"/>
  <rect x="20" y="51" width="7" height="8" rx="2.5" fill="rgba(0,0,0,0.35)"/>
  <rect x="33" y="51" width="7" height="8" rx="2.5" fill="rgba(0,0,0,0.35)"/>
  <rect x="46" y="51" width="7" height="8" rx="2.5" fill="rgba(0,0,0,0.35)"/>
