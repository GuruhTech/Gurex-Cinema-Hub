<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#e84c0a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon badge -->
  <rect x="2" y="4" width="52" height="52" rx="12" fill="url(#iconGrad)"/>
  <!-- Film strip notches top -->
  <rect x="8"  y="4"  width="6" height="7" rx="2" fill="rgba(0,0,0,0.35)"/>
  <rect x="20" y="4"  width="6" height="7" rx="2" fill="rgba(0,0,0,0.35)"/>
  <rect x="32" y="4"  width="6" height="7" rx="2" fill="rgba(0,0,0,0.35)"/>
  <rect x="44" y="4"  width="6" height="7" rx="2" fill="rgba(0,0,0,0.35)"/>
  <!-- Film strip notches bottom -->
  <rect x="8"  y="49" width="6" height="7" rx="2" fill="rgba(0,0,0,0.35)"/>
  <rect x="20" y="49" width="6" height="7" rx="2" fill="rgba(0,0,0,0.35)"/>
  <rect x="32" y="49" width="6" height="7" rx="2" fill="rgba(0,0,0,0.35)"/>
  <rect x="44" y="49" width="6" height="7" rx="2" fill="rgba(0,0,0,0.35)"/>
  <!-- Play triangle -->
  <polygon points="23,20 23,40 41,30" fill="white" opacity="0.95"/>

  <!-- GURU text -->
  <text x="64" y="38" font-family="'Arial Black', 'Impact', sans-serif" font-size="26" font-weight="900" letter-spacing="2" fill="url(#textGrad)" filter="url(#glow)">GURU</text>
  <!-- EX text -->
  <text x="147" y="38" font-family="'Arial Black', 'Impact', sans-serif" font-size="26" font-weight="900" letter-spacing="2" fill="white">EX</text>
</svg>
