<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f14"/>
      <stop offset="100%" stop-color="#13161e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#e84c0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orb -->
  <ellipse cx="600" cy="315" rx="420" ry="260" fill="url(#glow)"/>

  <!-- Decorative lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#ff6b35" stroke-width="3" opacity="0.6"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#ff6b35" stroke-width="3" opacity="0.6"/>

  <!-- Film strip dots left -->
  <rect x="40" y="60"  width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="40" y="100" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="40" y="140" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="40" y="180" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="40" y="440" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="40" y="480" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="40" y="520" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="40" y="560" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>

  <!-- Film strip dots right -->
  <rect x="1142" y="60"  width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="1142" y="100" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="1142" y="140" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="1142" y="180" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="1142" y="440" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="1142" y="480" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="1142" y="520" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>
  <rect x="1142" y="560" width="18" height="18" rx="4" fill="#ff6b35" opacity="0.25"/>

  <!-- Logo icon -->
  <rect x="432" y="150" width="130" height="130" rx="28" fill="url(#iconGrad)"/>
  <!-- Notches top -->
  <rect x="449" y="150" width="18" height="20" rx="5" fill="rgba(0,0,0,0.35)"/>
  <rect x="483" y="150" width="18" height="20" rx="5" fill="rgba(0,0,0,0.35)"/>
  <rect x="517" y="150" width="18" height="20" rx="5" fill="rgba(0,0,0,0.35)"/>
  <rect x="551" y="150" width="11" height="20" rx="5" fill="rgba(0,0,0,0.35)"/>
  <!-- Notches bottom -->
  <rect x="449" y="260" width="18" height="20" rx="5" fill="rgba(0,0,0,0.35)"/>
  <rect x="483" y="260" width="18" height="20" rx="5" fill="rgba(0,0,0,0.35)"/>
  <rect x="517" y="260" width="18" height="20" rx="5" fill="rgba(0,0,0,0.35)"/>
  <rect x="551" y="260" width="11" height="20" rx="5" fill="rgba(0,0,0,0.35)"/>
  <!-- Play button -->
  <polygon points="468,188 468,242 524,215" fill="white" opacity="0.95"/>

  <!-- GURU EX main text -->
  <text x="580" y="244" font-family="'Arial Black', Impact, sans-serif" font-size="92" font-weight="900" letter-spacing="4" fill="url(#orange)">GURU</text>
  <text x="872" y="244" font-family="'Arial Black', Impact, sans-serif" font-size="92" font-weight="900" letter-spacing="4" fill="white">EX</text>

  <!-- Divider -->
  <rect x="432" y="300" width="336" height="4" rx="2" fill="url(#orange)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="26" font-weight="400" letter-spacing="8" fill="white" opacity="0.55" text-anchor="middle">STREAM · DISCOVER · EXPLORE</text>
</svg>
